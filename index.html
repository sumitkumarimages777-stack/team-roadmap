<style>
:root{
  --paper:#F6F7F9; --card:#FFFFFF; --ink:#17233A; --muted:#5C6A82;
  --line:#E4E8EF; --line-strong:#C9D1DE;
  --indigo:#3B5BDB; --indigo-soft:#EBEFFC;
  --planned:#64748B; --planned-bg:#EEF1F5;
  --progress:#9A6A12; --progress-bg:#FBF1DC;
  --done:#1F7A4D;   --done-bg:#E3F2EA;
  --blocked:#B03A34;--blocked-bg:#FBE7E5;
  --radius:10px;
  --mono:"IBM Plex Mono",monospace;
  --sans:"IBM Plex Sans",system-ui,sans-serif;
  --disp:"Space Grotesk",var(--sans);
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--paper);color:var(--ink);font-family:var(--sans);font-size:15px;line-height:1.5}
button{font:inherit;cursor:pointer;background:none;border:none;color:inherit}
input,textarea{font:inherit;color:var(--ink)}
:focus-visible{outline:2px solid var(--indigo);outline-offset:2px;border-radius:4px}

.banner{background:#FFF7E0;border-bottom:1px solid #EAD9A0;color:#6B5410;padding:9px 24px;font-size:13.5px;text-align:center}

header{border-bottom:1px solid var(--line);background:var(--card)}
.head-inner{max-width:1200px;margin:0 auto;padding:26px 24px 22px;position:relative}
.corner-nav-wrap{position:absolute;top:28px;right:24px;display:flex;gap:8px}
.corner-nav{font-family:var(--disp);font-weight:600;font-size:14px;color:#fff;background:var(--indigo);border-radius:99px;padding:9px 16px;box-shadow:0 2px 10px rgba(59,91,219,.25);transition:background .15s}
.corner-nav:hover{background:#3350C4}
.corner-nav.ghost{background:var(--card);color:var(--indigo);border:1.5px solid var(--indigo);box-shadow:none}
.corner-nav.ghost:hover{background:var(--indigo-soft)}

/* workspace area switcher (sidebar) */
#ws-switch{display:flex;flex-direction:column;gap:6px;margin-bottom:20px}
#ws-switch:empty{display:none}
#edu-switch{display:flex;flex-direction:column;gap:6px;margin-top:20px}
#edu-switch:empty{display:none}
.ws-label{font-family:var(--mono);font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin:4px 0 4px 4px}
.ws-item{display:flex;align-items:center;gap:9px;border:1px solid var(--line);background:var(--card);border-radius:10px;padding:10px 14px;font-family:var(--disp);font-weight:600;font-size:14px;color:var(--muted);text-align:left;width:100%}
.ws-item:hover{border-color:var(--line-strong);color:var(--ink)}
.ws-item.active{border-color:var(--indigo);color:var(--indigo);background:var(--indigo-soft);box-shadow:0 0 0 1px var(--indigo)}
.ws-item .dot{width:8px;height:8px;border-radius:50%;background:currentColor;flex:none}
@media(max-width:860px){#ws-switch,#edu-switch{flex-direction:row;overflow-x:auto}.ws-item{min-width:180px}.ws-label{display:none}}
@media(max-width:760px){.corner-nav-wrap{position:static;margin-bottom:14px}}

/* content roadmap rows */
.ct-row{display:flex;align-items:flex-start;gap:10px;padding:8px 6px;border-radius:8px}
.ct-row:hover{background:var(--paper)}
.ct-dates{display:flex;gap:16px;font-family:var(--mono);font-size:11.5px;color:var(--muted);margin-top:4px;flex-wrap:wrap}
.ct-dates b{color:var(--ink);font-weight:500}
.budget{font-family:var(--mono);font-size:12px;color:var(--done);background:var(--done-bg);padding:3px 10px;border-radius:99px}
@media(max-width:600px){.ct-row{flex-wrap:wrap}.ct-row .meta{width:100%;justify-content:flex-start;padding-left:62px}}
.eyebrow{font-family:var(--mono);font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--indigo)}
h1{font-family:var(--disp);font-weight:700;font-size:clamp(26px,4vw,36px);letter-spacing:-.01em;margin-top:4px}
.subtitle{color:var(--muted);max-width:640px;margin-top:6px}
.head-meta{display:flex;flex-wrap:wrap;gap:22px;margin-top:18px;align-items:center}
.stat{display:flex;flex-direction:column}
.stat b{font-family:var(--disp);font-size:22px;font-weight:600}
.stat span{font-size:12px;color:var(--muted)}
.overall{flex:1;min-width:220px;max-width:420px}
.overall .bar{height:8px;background:var(--line);border-radius:99px;overflow:hidden;margin-top:6px}
.overall .bar i{display:block;height:100%;background:var(--done);border-radius:99px;transition:width .5s ease}
.overall label{font-size:12px;color:var(--muted)}
.updated{font-family:var(--mono);font-size:12px;color:var(--muted)}
.live{font-family:var(--mono);font-size:11px;padding:3px 10px;border-radius:99px;background:var(--done-bg);color:var(--done)}
.live.off{background:var(--planned-bg);color:var(--planned)}

.layout{max-width:1200px;margin:0 auto;padding:24px;display:grid;grid-template-columns:260px 1fr;gap:24px}
@media(max-width:860px){.layout{grid-template-columns:1fr;padding:16px}}

aside{position:sticky;top:16px;align-self:start}
@media(max-width:860px){aside{position:static}}
.side-title{font-family:var(--mono);font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin:4px 0 10px 4px}
.mods{display:flex;flex-direction:column;gap:6px}
@media(max-width:860px){.mods{flex-direction:row;overflow-x:auto;padding-bottom:6px}}
.mod{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:12px 14px;text-align:left;width:100%;transition:border-color .15s;position:relative;cursor:pointer}
.mod .card-acts{position:absolute;top:8px;right:8px;background:var(--card);border-radius:6px}
.mod:hover .card-acts,.mod:focus-within .card-acts{opacity:1}
@media(max-width:860px){.mod{min-width:210px}}
.mod:hover{border-color:var(--line-strong)}
.mod.active{border-color:var(--indigo);box-shadow:0 0 0 1px var(--indigo)}
.mod .name{font-weight:600;font-size:14px}
.mod .bar{height:5px;background:var(--line);border-radius:99px;margin-top:8px;overflow:hidden}
.mod .bar i{display:block;height:100%;background:var(--done)}
.mod .pct{font-family:var(--mono);font-size:11px;color:var(--muted);margin-top:5px;display:block}
.mod.add{border-style:dashed;color:var(--muted);text-align:center;font-size:13.5px}
.mod.add:hover{color:var(--indigo);border-color:var(--indigo)}

.controls{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:16px;align-items:center}
.search{flex:1;min-width:180px;position:relative}
.search input{width:100%;padding:9px 12px 9px 34px;border:1px solid var(--line);border-radius:var(--radius);background:var(--card)}
.search svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);width:16px;height:16px;stroke:var(--muted)}
.chip{padding:7px 12px;border-radius:99px;border:1px solid var(--line);background:var(--card);font-size:13px;color:var(--muted)}
.chip.active{border-color:var(--ink);color:var(--ink);font-weight:600}
.chip .dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:6px;vertical-align:1px}
.tools{display:flex;gap:8px;margin-left:auto;flex-wrap:wrap}
.tool{font-size:13px;color:var(--muted);padding:7px 10px;border:1px solid var(--line);border-radius:var(--radius);background:var(--card)}
.tool:hover{color:var(--ink);border-color:var(--line-strong)}
.tool.primary{background:var(--indigo);border-color:var(--indigo);color:#fff;font-weight:600}
.tool.primary:hover{background:#3350C4;color:#fff}
.tool.editing{background:var(--done);border-color:var(--done);color:#fff;font-weight:600}

.module-block{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:20px 22px;margin-bottom:18px}
.module-head{display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:6px}
.vision{background:var(--indigo-soft);border-radius:var(--radius);padding:12px 16px;margin:4px 0 14px}
.vision .v-eyebrow{display:flex;align-items:center;gap:8px;font-family:var(--mono);font-size:11px;letter-spacing:.1em;color:var(--indigo);margin-bottom:4px}
.vision .v-eyebrow .acts{margin-left:auto}
.vision .v-text{font-size:14px;line-height:1.65;color:#2A3F8F;white-space:pre-wrap;overflow-wrap:anywhere}
.vision .v-text.clamped{display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.vision .v-more{background:none;border:none;padding:0;margin-top:4px;font-family:var(--mono);font-size:12px;color:var(--indigo);cursor:pointer;text-decoration:underline;text-underline-offset:3px}
.vision.add-vision{background:none;border:1.5px dashed var(--line-strong);color:var(--muted);font-family:var(--mono);font-size:12px;cursor:pointer;width:100%;text-align:left}
.vision.add-vision:hover{border-color:var(--indigo);color:var(--indigo)}
.module-head h2{font-family:var(--disp);font-size:20px;font-weight:600}
.module-head .pct{font-family:var(--mono);font-size:12px;color:var(--muted)}
.module-head .spacer{flex:1}
.tree{margin-top:10px}
.node .row{display:flex;align-items:flex-start;gap:10px;padding:7px 6px;border-radius:8px}
.node .row:hover{background:var(--paper)}
.num{font-family:var(--mono);font-size:12px;color:var(--indigo);min-width:52px;padding-top:3px;user-select:none}
.caret{width:18px;height:18px;flex:none;margin-top:3px;display:flex;align-items:center;justify-content:center;border-radius:5px;color:var(--muted);transition:transform .15s}
.caret:hover{background:var(--indigo-soft);color:var(--indigo)}
.caret.open{transform:rotate(90deg)}
.caret.leaf{visibility:hidden}
.node .body{flex:1;min-width:0}
.node .title{font-weight:500;overflow-wrap:anywhere}
.node.parent > .row .title{font-weight:600}
.note{font-size:12.5px;color:var(--muted);margin-top:2px}
.meta{display:flex;gap:8px;align-items:center;flex:none;padding-top:2px;flex-wrap:wrap;justify-content:flex-end}
.owner{font-family:var(--mono);font-size:11px;color:var(--muted);border:1px dashed var(--line-strong);padding:2px 7px;border-radius:99px}
.pill{font-family:var(--mono);font-size:11px;padding:3px 9px;border-radius:99px;letter-spacing:.02em}
.pill.planned{background:var(--planned-bg);color:var(--planned)}
.pill.progress{background:var(--progress-bg);color:var(--progress)}
.pill.done{background:var(--done-bg);color:var(--done)}
.pill.blocked{background:var(--blocked-bg);color:var(--blocked)}
.mini{font-family:var(--mono);font-size:11px;color:var(--muted)}
.children{margin-left:26px;border-left:1px solid var(--line);padding-left:14px}
.hidden{display:none}
.empty{color:var(--muted);text-align:center;padding:40px 0}

.acts{display:flex;gap:2px;opacity:0;transition:opacity .12s}
.node .row:hover .acts, .module-head:hover .acts, .kr:hover .acts, .obj-head:hover .acts, .ct-row:hover .acts, .ct-row:focus-within .acts{opacity:1}
@media(hover:none){.acts{opacity:.6}}
.act{width:26px;height:26px;display:flex;align-items:center;justify-content:center;border-radius:6px;color:var(--muted)}
.act:hover{background:var(--indigo-soft);color:var(--indigo)}
.act.danger:hover{background:var(--blocked-bg);color:var(--blocked)}
.act svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.addline{margin:6px 0 2px;font-size:13px;color:var(--muted);border:1px dashed var(--line-strong);border-radius:8px;padding:6px 12px;display:block;width:100%;text-align:center}
.addline:hover{color:var(--indigo);border-color:var(--indigo)}
.addline.indent{width:auto;margin-left:70px;text-align:left}

/* ---------- OKR view ---------- */
.obj-card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:20px 22px;margin-bottom:18px}
.obj-head{display:flex;align-items:flex-start;gap:12px;flex-wrap:wrap}
.obj-tag{font-family:var(--mono);font-size:12px;color:#fff;background:var(--indigo);border-radius:7px;padding:3px 8px;margin-top:2px}
.obj-title{font-family:var(--disp);font-size:18px;font-weight:600;flex:1;min-width:200px}
.obj-score{font-family:var(--mono);font-size:13px;font-weight:500;padding:4px 12px;border-radius:99px}
.score-low{background:var(--blocked-bg);color:var(--blocked)}
.score-mid{background:var(--progress-bg);color:var(--progress)}
.score-high{background:var(--done-bg);color:var(--done)}
.krs{margin-top:14px;display:flex;flex-direction:column;gap:4px}
.kr{display:flex;align-items:flex-start;gap:10px;padding:8px 6px;border-radius:8px}
.kr:hover{background:var(--paper)}
.kr .num{min-width:44px}
.kr .body{flex:1;min-width:0}
.kr .bar-wrap{display:flex;align-items:center;gap:10px;margin-top:6px}
.kr .bar{flex:1;height:6px;background:var(--line);border-radius:99px;overflow:hidden;max-width:340px}
.kr .bar i{display:block;height:100%;border-radius:99px;transition:width .4s ease}
.kr .fig{font-family:var(--mono);font-size:12px;color:var(--muted);white-space:nowrap}
.kr .fig b{color:var(--ink);font-weight:500}

.upd:hover{background:var(--indigo-soft)}
@media(max-width:600px){.kr{flex-wrap:wrap}.kr .meta{width:100%;justify-content:flex-start;padding-left:54px}}

.overlay{position:fixed;inset:0;background:rgba(23,35,58,.45);display:none;align-items:center;justify-content:center;padding:16px;z-index:100}
.overlay.show{display:flex}
.dialog{background:var(--card);border-radius:14px;padding:22px;width:100%;max-width:460px;box-shadow:0 20px 60px rgba(23,35,58,.25)}
.dialog h3{font-family:var(--disp);font-size:18px;margin-bottom:14px}
.field{margin-bottom:12px}
.field label{display:block;font-size:12px;color:var(--muted);margin-bottom:4px;font-family:var(--mono);text-transform:uppercase;letter-spacing:.08em}
.field input,.field textarea,.field select{width:100%;padding:9px 12px;border:1px solid var(--line);border-radius:8px;background:var(--paper);font:inherit;color:var(--ink)}
.field textarea{resize:vertical;min-height:56px}
.okr-chip{font-family:var(--mono);font-size:11px;color:var(--indigo);background:var(--indigo-soft);padding:3px 8px;border-radius:99px;cursor:pointer;border:none;white-space:nowrap}
.okr-chip:hover{background:#DDE4FA}
.lw{margin-top:14px;border-top:1px dashed var(--line-strong);padding-top:10px}
.lw-head{font-family:var(--mono);font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:4px}
.lw-row{display:flex;align-items:center;gap:10px;padding:5px 6px;border-radius:6px;cursor:pointer;font-size:13.5px;width:100%;text-align:left}
.lw-row:hover{background:var(--paper)}
.lw-row .t{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.lw-where{font-family:var(--mono);font-size:11px;color:var(--muted)}

/* team ideas */
.st-new{background:var(--indigo-soft);color:var(--indigo)}
.st-review{background:var(--progress-bg);color:var(--progress)}
.st-pipeline{background:#E4F0FB;color:#1D5FA8}
.st-shipped{background:var(--done-bg);color:var(--done)}
.st-notnow{background:var(--planned-bg);color:var(--planned)}
.vote{display:flex;flex-direction:column;align-items:center;gap:0;border:1px solid var(--line);border-radius:8px;padding:5px 10px;font-family:var(--mono);color:var(--muted);flex:none}
.vote:hover{border-color:var(--indigo);color:var(--indigo)}
.vote.voted{border-color:var(--indigo);background:var(--indigo-soft);color:var(--indigo)}
.vote b{font-size:14px}
.vote span{font-size:10px}
.lb-rank{font-family:var(--disp);font-size:18px;width:30px;flex:none;text-align:center}
.lb-card{display:flex;align-items:center;gap:10px}
.lb-pts{font-family:var(--mono);font-size:12px;color:var(--indigo);margin-left:auto;white-space:nowrap}
.lb-note{font-size:11.5px;color:var(--muted);padding:8px 12px;border:1px dashed var(--line-strong);border-radius:10px;line-height:1.5}
.submit-idea{width:100%;padding:13px;border:1.5px dashed var(--indigo);border-radius:var(--radius);color:var(--indigo);font-family:var(--disp);font-weight:600;font-size:15px;background:var(--card);margin-bottom:16px}
.submit-idea:hover{background:var(--indigo-soft)}
.stage-chips{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}

/* photos */
.photo-list{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}
.photo-list:empty{display:none}
.photo-item{position:relative}
.photo-item img{width:64px;height:64px;object-fit:cover;border-radius:8px;border:1px solid var(--line);display:block}
.photo-item .rm{position:absolute;top:-7px;right:-7px;width:20px;height:20px;border-radius:50%;background:var(--ink);color:#fff;font-size:12px;line-height:20px;text-align:center}
.photo-item.up{opacity:.5}
.photo-strip{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px}
.photo-strip img{width:52px;height:52px;object-fit:cover;border-radius:7px;border:1px solid var(--line);cursor:zoom-in;display:block}
.lightbox{position:fixed;inset:0;background:rgba(10,15,25,.82);display:flex;align-items:center;justify-content:center;z-index:300;cursor:zoom-out;padding:24px}
.lightbox img{max-width:96%;max-height:96%;border-radius:10px;box-shadow:0 20px 80px rgba(0,0,0,.5)}

/* kanban (Development + Bugs) */
.kanban{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
@media(max-width:1100px){.kanban{grid-template-columns:repeat(2,1fr)}}
@media(max-width:600px){.kanban{grid-template-columns:1fr}}
.kcol{background:#EEF0F4;border-radius:12px;padding:10px;min-height:120px}
.kcol-head{display:flex;align-items:center;gap:8px;padding:4px 6px 8px}
.kcol-head b{font-family:var(--mono);font-size:11.5px;letter-spacing:.09em;text-transform:uppercase;color:var(--muted)}
.kcol-head .cnt{font-family:var(--mono);font-size:11px;color:var(--muted);margin-left:auto}
.kcol.kdone .kcol-head b{color:var(--done)}
.kcard{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:10px 12px;margin-bottom:8px}
.kcard .title{font-weight:500;font-size:14px;overflow-wrap:anywhere}
.kcard .note{margin-top:3px}

.kmove{display:flex;gap:2px;margin-left:auto}

.kmove button:hover:not(:disabled){border-color:var(--indigo);color:var(--indigo)}
.kmove button:disabled{opacity:.3;cursor:default}
.src{font-family:var(--mono);font-size:10.5px;padding:2px 7px;border-radius:99px}
.src.student{background:#FBEBDD;color:#A05A16}
.src.team{background:var(--indigo-soft);color:var(--indigo)}
.kadd{width:100%;font-size:12.5px;color:var(--muted);border:1px dashed var(--line-strong);border-radius:8px;padding:6px}
.kadd:hover{color:var(--indigo);border-color:var(--indigo)}
.field-row{display:flex;gap:10px}
.field-row .field{flex:1}
.check{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--muted);margin-bottom:12px}
.check input{width:auto}
.dialog .btns{display:flex;gap:8px;justify-content:flex-end;margin-top:16px}
.btn{padding:8px 16px;border-radius:8px;border:1px solid var(--line);font-size:14px}
.btn.save{background:var(--indigo);border-color:var(--indigo);color:#fff;font-weight:600}

footer{max-width:1200px;margin:0 auto;padding:10px 24px 40px;color:var(--muted);font-size:12.5px}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--ink);color:#fff;padding:10px 18px;border-radius:99px;font-size:13px;transition:transform .25s;z-index:200;max-width:90vw;text-align:center}
.toast.show{transform:translateX(-50%) translateY(0)}
@media (prefers-reduced-motion: reduce){*{transition:none!important;animation:none!important}}
</style>
</head>
<body>

<div class="banner hidden" id="banner"></div>

<header>
  <div class="head-inner">
    <div class="corner-nav-wrap">
      <button class="corner-nav ghost" id="nav-a">Workspace</button>
      <button class="corner-nav" id="nav-b">OKRs</button>
    </div>
    <span class="eyebrow">Internal · Team Workspace</span>
    <h1 id="rm-title"></h1>
    <p class="subtitle" id="rm-subtitle"></p>
    <div class="head-meta" id="stats"></div>
    <div id="company-vision"></div>
  </div>
</header>

<div class="layout">
  <aside>
    <div id="ws-switch"></div>
    <div class="side-title" id="side-title">Modules</div>
    <div class="mods" id="mods"></div>
    <div id="edu-switch"></div>
  </aside>

  <main>
    <div class="controls">
      <span id="rm-controls" style="display:contents">
        <div class="search">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></svg>
          <input id="search" type="search" placeholder="Search tasks, owners…" aria-label="Search roadmap">
        </div>
        <button class="chip active" data-status="all">All</button>
        <button class="chip" data-status="progress"><span class="dot" style="background:var(--progress)"></span>In progress</button>
        <button class="chip" data-status="planned"><span class="dot" style="background:var(--planned)"></span>Planned</button>
        <button class="chip" data-status="done"><span class="dot" style="background:var(--done)"></span>Done</button>
        <button class="chip" data-status="blocked"><span class="dot" style="background:var(--blocked)"></span>Blocked</button>
      </span>
      <div class="tools">
        <span id="rm-tools" style="display:contents">
          <button class="tool" id="expand-all">Expand all</button>
          <button class="tool" id="collapse-all">Collapse all</button>
        </span>
        <button class="tool" id="nav-team-ideas">🧠 Team Ideas</button>
        <button class="tool" id="nav-ideas">💡 Student Ideas</button>
        <button class="tool" id="backup-btn" title="Download all data (roadmap, OKRs, content, ideas, dev, bugs) as a JSON file on your PC">⬇ Backup</button>
        <button class="tool" id="import-btn" title="Restore everything from a backup file (needs Edit mode)">⬆ Import</button>
        <input type="file" id="import-file" accept=".json,application/json" style="display:none">
        <button class="tool" id="refresh-btn" title="Fetch the latest changes made by teammates">⟳ Refresh</button>
        <button class="tool primary" id="edit-toggle">✎ Edit</button>
      </div>

    <div id="content"></div>
  </main>
</div>

<footer id="foot">
  Turn on <b>Edit</b> to add or change anything. Roadmap: click status pills to cycle progress. OKRs: use “Update” on a key result to log the latest number.
</footer>

<div class="overlay" id="overlay">
  <div class="dialog" role="dialog" aria-modal="true">
    <h3 id="dlg-title">Edit</h3>
    <div class="field" id="f-title-wrap"><label for="f-title">Title</label><input id="f-title"></div>
    <div class="field" id="f-owner-wrap"><label for="f-owner">Owner (optional)</label><input id="f-owner" placeholder="e.g. Backend team / Aman"></div>
    <div class="field" id="f-note-wrap"><label for="f-note">Note (optional)</label><textarea id="f-note" placeholder="One-line detail, dependency, deadline…"></textarea></div>
    <div class="field-row" id="f-dates-wrap">
      <div class="field"><label for="f-start">Start (optional)</label><input id="f-start" placeholder="e.g. 4th July"></div>
      <div class="field"><label for="f-deadline">Deadline (optional)</label><input id="f-deadline" placeholder="e.g. 12th July"></div>
    </div>
    <div class="field" id="f-budget-wrap"><label for="f-budget">Budget (optional)</label><input id="f-budget" placeholder="e.g. ₹2,00,000"></div>
    <div class="field" id="f-okr-wrap"><label for="f-okr">Link to OKR objective (optional)</label><select id="f-okr"></select></div>
    <div class="field" id="f-area-wrap"><label for="f-area">Product area</label><select id="f-area"></select></div>
    <div class="field" id="f-photos-wrap">
      <label for="f-photos">Photos (optional)</label>
      <input type="file" id="f-photos" accept="image/*" multiple>
      <div id="f-photo-list" class="photo-list"></div>
    </div>
    <div class="field-row" id="f-metric-wrap">
      <div class="field"><label for="f-current">Current</label><input id="f-current" type="number" step="any"></div>
      <div class="field"><label for="f-target">Target</label><input id="f-target" type="number" step="any"></div>
      <div class="field"><label for="f-unit">Unit</label><input id="f-unit" placeholder="%, users, min…"></div>
    </div>
    <label class="check" id="f-invert-wrap"><input type="checkbox" id="f-invert"> Lower is better (e.g. reducing time, cost, errors)</label>
    <div class="btns">
      <button class="btn" id="dlg-cancel">Cancel</button>
      <button class="btn save" id="dlg-save">Save</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const STATUS_ORDER = ["planned","progress","done","blocked"];
const STATUS_LABEL = {planned:"Planned", progress:"In progress", done:"Done", blocked:"Blocked"};
const $ = id => document.getElementById(id);

let DATA = null, OKRS = null, CONTENT = null, TIDEAS = null, DEV = null, BUGS = null, db = null, bugsDb = false;
const KCOLS = [ {key:"todo",label:"To Do"}, {key:"progress",label:"In Progress"}, {key:"review",label:"In Review"}, {key:"done",label:"Done"} ];
const STAGE_ORDER = ["new","review","pipeline","shipped","notnow"];
const STAGE_LABEL = {new:"New", review:"Under review", pipeline:"In pipeline", shipped:"Shipped", notnow:"Not now"};
const STAGE_PTS = {new:1, review:1, pipeline:3, shipped:5, notnow:1};
let view = "roadmap";           // "roadmap" | "okr" | "content"
let editMode = false;
let leaderMode = false;   // unlocked with LEADER_PASSCODE — guards Vision, Mission, OKRs, Core Values etc.
function requireLeader(){
  if(leaderMode || sessionStorage.getItem("rm-leader")==="1"){ leaderMode = true; return true; }
  const p = prompt("Leadership passcode (Vision, Mission & OKRs are protected):");
  if(p === null) return false;
  if(p !== LEADER_PASSCODE){ toast("Wrong leadership passcode"); return false; }
  leaderMode = true;
  sessionStorage.setItem("rm-leader","1");
  return true;
}
let activeModule = "all";
let activeCycle = null;
let activeStatus = "all";
let query = "";
const collapsed = new Set();

/* ---------- helpers ---------- */
function normalize(d){
  d = d || {};
  d.title = d.title || "Product Roadmap";
  d.modules = d.modules || [];
  const walk = n => { n.items = n.items || []; n.items.forEach(walk); };
  d.modules.forEach(m => { m.items = m.items || []; m.items.forEach(walk); });
  return d;
}
function normalizeOkrs(o){
  o = o || {};
  o.cycles = o.cycles || [];
  o.cycles.forEach(c => {
    c.objectives = c.objectives || [];
    c.objectives.forEach((ob,i) => {
      ob.krs = ob.krs || [];
      if(!ob.id) ob.id = "ob-" + c.key + "-" + i;   // deterministic so all teammates derive the same id
    });
  });
  return o;
}
function findObjective(id){
  for(const c of OKRS.cycles){
    const i = c.objectives.findIndex(ob=>ob.id===id);
    if(i>=0) return {ob:c.objectives[i], cyc:c, num:i+1};
  }
  return null;
}
function okrChip(id){
  const f = findObjective(id);
  if(!f) return null;
  const b = document.createElement("button");
  b.className = "okr-chip";
  b.textContent = "🎯 O"+f.num;
  b.title = f.ob.title+" · "+f.cyc.name;
  b.onclick = e => { e.stopPropagation(); activeCycle = f.cyc.key; view = "okr"; renderAll(); };
  return b;
}
function linkedWork(obId){
  const out = [];
  if(!obId) return out;   // a brand-new objective has no id yet — nothing can be linked to it
  DATA.modules.forEach(m=>{
    if(m.okr===obId){
      const lv = m.items.flatMap(leavesOf);
      out.push({title:m.name, where:"Module", pct:pctOf(lv), nav:()=>{view="roadmap"; activeModule=m.key;}});
    }
    const walk = n => {
      if(n.okr===obId){
        const lv = leavesOf(n);
        out.push({title:n.title, where:m.name, status:(n.items&&n.items.length)?null:n.status, pct:pctOf(lv), nav:()=>{view="roadmap"; activeModule=m.key;}});
      }
      (n.items||[]).forEach(walk);
    };
    m.items.forEach(walk);
  });
  CONTENT.sections.forEach(s=>{
    s.tasks.forEach(t=>{
      if(t.okr===obId) out.push({title:t.title, where:"Content · "+s.name, status:t.status, pct:t.status==="done"?100:t.status==="progress"?50:0, nav:()=>{view="content"; activeSection=s.key;}});
    });
  });
  return out;
}
function normalizeContent(c){
  c = c || {};
  c.sections = c.sections || [];
  c.sections.forEach(s => {
    s.tasks = s.tasks || [];
    s.tasks.forEach(t => t.status = t.status || "planned");
  });
  return c;
}
let activeSection = "all";
let activeStage = "all";
function normalizeTeamIdeas(t){
  t = t || {};
  t.items = t.items || [];
  t.items.forEach(i=>{
    i.stage = i.stage || "new";
    i.votes = i.votes || 0;
    i.owner = i.owner || "Anonymous";
    if(!i.id) i.id = "ti-" + Math.random().toString(36).slice(2,9);
  });
  return t;
}
function normalizeDev(d){
  d = d || {};
  d.sprints = d.sprints || [];
  d.sprints.forEach(sp=>{ if(!sp.id) sp.id = "sp-" + Math.random().toString(36).slice(2,9); });
  d.cards = d.cards || [];
  d.cards.forEach(c=>{
    c.col = KCOLS.some(k=>k.key===c.col) ? c.col : "todo";
    if(c.sprint===undefined || (c.sprint && !d.sprints.some(sp=>sp.id===c.sprint))) c.sprint = null;
    if(!c.id) c.id = "dv-" + Math.random().toString(36).slice(2,9);
  });
  return d;
}
let devSprint = null;   // sprint currently shown on the board
function normalizeBugs(b){
  b = b || {};
  b.tickets = b.tickets || [];
  b.tickets.forEach(t=>{
    t.col = KCOLS.some(k=>k.key===t.col) ? t.col : "todo";
    t.source = t.source || "team";
    t.reporter = t.reporter || "Anonymous";
    if(!t.id) t.id = "bg-" + Math.random().toString(36).slice(2,9);
  });
  return b;
}
function leavesOf(node){
  if(node.items && node.items.length) return node.items.flatMap(leavesOf);
  node.status = node.status || "planned";
  return [node];
}
function pctOf(leaves){
  if(!leaves.length) return 0;
  const s = leaves.reduce((a,l)=> a + (l.status==="done"?1: l.status==="progress"?0.5:0), 0);
  return Math.round(s/leaves.length*100);
}
function counts(leaves){
  const c = {planned:0,progress:0,done:0,blocked:0};
  leaves.forEach(l=>c[l.status]++);
  return c;
}
function krPct(kr){
  const cur = Number(kr.current)||0, tgt = Number(kr.target)||0;
  if(kr.invert){
    // lower is better: score how far we've moved from start toward target.
    const start = Number(kr.start ?? kr.current);
    if(!isFinite(start) || start===tgt) return cur<=tgt ? 100 : 0;
    return Math.max(0, Math.min(100, Math.round((start-cur)/(start-tgt)*100)));
  }
  if(!tgt) return 0;
  return Math.max(0, Math.min(100, Math.round(cur/tgt*100)));
}
function objPct(ob){
  if(!ob.krs.length) return 0;
  return Math.round(ob.krs.reduce((a,k)=>a+krPct(k),0)/ob.krs.length);
}
function scoreClass(p){ return p<30 ? "score-low" : p<70 ? "score-mid" : "score-high"; }
function scoreColor(p){ return p<30 ? "var(--blocked)" : p<70 ? "var(--progress)" : "var(--done)"; }
function clean(d){ return JSON.parse(JSON.stringify(d)); }
function todayStr(){ return new Date().toLocaleDateString("en-GB",{day:"numeric",month:"long",year:"numeric"}); }
function fmt(n){ n = Number(n)||0; return Number.isInteger(n) ? n : +n.toFixed(2); }

/* ---------- persistence (JSONBin) ---------- */
const configured = JSONBIN_CONFIG.binId && JSONBIN_CONFIG.apiKey;
const BIN_URL = "https://api.jsonbin.io/v3/b/" + JSONBIN_CONFIG.binId;
const BIN_HEADERS = { "Content-Type":"application/json", "X-Access-Key": JSONBIN_CONFIG.apiKey };
let saving = false;
let lastSnapshot = "";

async function pushAll(){
  if(!db) { renderAll(); return; }
  const payload = { roadmap: clean(DATA), okrs: clean(OKRS), content: clean(CONTENT), teamIdeas: clean(TIDEAS), dev: clean(DEV) };
  saving = true;
  try{
    const r = await fetch(BIN_URL, { method:"PUT", headers: BIN_HEADERS, body: JSON.stringify(payload) });
    if(!r.ok) throw new Error("HTTP "+r.status);
    lastSnapshot = JSON.stringify(payload);
  }catch(e){ toast("Save failed: "+e.message+" — check your internet, then try again"); }
  saving = false;
}
function saveRoadmap(){ DATA.updated = todayStr(); renderAll(); pushAll(); }
function saveOkrs(){ OKRS.updated = todayStr(); renderAll(); pushAll(); }
function saveContent(){ CONTENT.updated = todayStr(); renderAll(); pushAll(); }
function saveTeamIdeas(){ TIDEAS.updated = todayStr(); renderAll(); pushAll(); }
function saveDev(){ DEV.updated = todayStr(); syncLinkedBugs(); renderAll(); pushAll(); }

const BUGS_URL = "https://api.jsonbin.io/v3/b/" + BUGS_BIN_ID;
const bugsConfigured = BUGS_BIN_ID && JSONBIN_CONFIG.apiKey;
async function fetchBugs(){
  const r = await fetch(BUGS_URL + "/latest", { headers: { "X-Access-Key": JSONBIN_CONFIG.apiKey, "X-Bin-Meta": "false" } });
  if(!r.ok) throw new Error("HTTP "+r.status);
  return r.json();
}
async function pushBugs(){
  if(!bugsDb){ renderAll(); return; }
  try{
    const r = await fetch(BUGS_URL, { method:"PUT", headers: BIN_HEADERS, body: JSON.stringify(clean(BUGS)) });
    if(!r.ok) throw new Error("HTTP "+r.status);
  }catch(e){ toast("Bug save failed: "+e.message); }
}
function saveBugs(){ BUGS.updated = todayStr(); renderAll(); pushBugs(); }
async function refreshBugs(){
  if(!bugsConfigured) return;
  try{
    const rec = await fetchBugs();
    BUGS = normalizeBugs(rec);
    bugsDb = true;
  }catch(e){ bugsDb = false; }
}

async function fetchAll(){
  const r = await fetch(BIN_URL + "/latest", { headers: { "X-Access-Key": JSONBIN_CONFIG.apiKey, "X-Bin-Meta": "false" } });
  if(!r.ok) throw new Error("HTTP "+r.status);
  return r.json();
}
async function refresh(showMsg){
  if(!db || saving || $("overlay").classList.contains("show")) return;
  try{
    const rec = await fetchAll();
    if(rec && rec.roadmap){
      const snap = JSON.stringify({ roadmap: rec.roadmap, okrs: rec.okrs, content: rec.content, teamIdeas: rec.teamIdeas, dev: rec.dev });
      if(snap !== lastSnapshot){
        lastSnapshot = snap;
        DATA = normalize(rec.roadmap);
        OKRS = normalizeOkrs(rec.okrs);
        CONTENT = normalizeContent(rec.content || clean(DEFAULT_CONTENT));
        TIDEAS = normalizeTeamIdeas(rec.teamIdeas || clean(DEFAULT_TEAM_IDEAS));
        DEV = normalizeDev(rec.dev || clean(DEFAULT_DEV));
        renderAll();
        if(showMsg) toast("Refreshed — you're seeing the latest");
      } else if(showMsg) toast("Already up to date");
    }
    await refreshBugs();
    syncLinkedBugs();
    renderAll();
  }catch(e){ if(showMsg) toast("Couldn't refresh: "+e.message); }
}

async function start(){
  DATA = normalize(clean(DEFAULT_ROADMAP));
  OKRS = normalizeOkrs(clean(DEFAULT_OKRS));
  CONTENT = normalizeContent(clean(DEFAULT_CONTENT));
  TIDEAS = normalizeTeamIdeas(clean(DEFAULT_TEAM_IDEAS));
  DEV = normalizeDev(clean(DEFAULT_DEV));
  BUGS = normalizeBugs({tickets:[]});
  if(configured){
    try{
      const rec = await fetchAll();
      db = true;
      if(rec && rec.roadmap){
        DATA = normalize(rec.roadmap);
        OKRS = normalizeOkrs(rec.okrs);
        if(rec.content) CONTENT = normalizeContent(rec.content);
        if(rec.teamIdeas) TIDEAS = normalizeTeamIdeas(rec.teamIdeas);
        if(rec.dev) DEV = normalizeDev(rec.dev);
        if(rec.content && rec.teamIdeas && rec.dev){
          lastSnapshot = JSON.stringify({ roadmap: clean(DATA), okrs: clean(OKRS), content: clean(CONTENT), teamIdeas: clean(TIDEAS), dev: clean(DEV) });
        } else {
          await pushAll();   // existing bin from an older version: add the new section(s) to it
        }
      } else {
        await pushAll();   // first run: seed the bin with the defaults
      }
      await refreshBugs();
      syncLinkedBugs();
      // pick up teammates' changes when you come back to the tab
      document.addEventListener("visibilitychange", ()=>{ if(!document.hidden) refresh(false); });
    }catch(e){
      showBanner("Couldn't reach JSONBin ("+e.message+"). Check the Bin ID and Access Key in index.html. Changes won't be saved.");
    }
  } else {
    showBanner("Live team editing is not connected yet — changes here stay only on your screen. See README.md for the 3-minute JSONBin setup.");
  }
  renderAll();
}

/* ---------- filtering (roadmap) ---------- */
function nodeMatches(node){
  const text = (node.title+" "+(node.owner||"")+" "+(node.note||"")).toLowerCase();
  const qOk = !query || text.includes(query);
  const lv = leavesOf(node);
  if(node.items && node.items.length){
    const childHit = node.items.some(nodeMatches);
    return childHit || (qOk && (activeStatus==="all" || lv.some(l=>l.status===activeStatus)));
  }
  return qOk && (activeStatus==="all" || node.status===activeStatus);
}

function compressImage(file){
  return new Promise((res,rej)=>{
    const img = new Image();
    img.onload = ()=>{
      const MAX = 1400;
      let w = img.width, h = img.height;
      if(Math.max(w,h) > MAX){ const k = MAX/Math.max(w,h); w = Math.round(w*k); h = Math.round(h*k); }
      const cv = document.createElement("canvas");
      cv.width = w; cv.height = h;
      cv.getContext("2d").drawImage(img,0,0,w,h);
      res(cv.toDataURL("image/jpeg",0.82).split(",")[1]);
      URL.revokeObjectURL(img.src);
    };
    img.onerror = rej;
    img.src = URL.createObjectURL(file);
  });
}
async function uploadPhoto(file){
  const base64 = await compressImage(file);
  const fd = new FormData();
  fd.append("image", base64);
  const r = await fetch("https://api.imgbb.com/1/upload?key="+IMGBB_KEY, {method:"POST", body:fd});
  const j = await r.json();
  if(!j || !j.success) throw new Error((j && j.error && j.error.message) || "upload failed");
  return j.data.url;
}
function photoStrip(urls){
  if(!urls || !urls.length) return null;
  const strip = document.createElement("div");
  strip.className = "photo-strip";
  urls.forEach(u=>{
    const img = document.createElement("img");
    img.src = u; img.alt = "attachment"; img.loading = "lazy";
    img.onclick = e=>{ e.stopPropagation(); showPhoto(u); };
    strip.appendChild(img);
  });
  return strip;
}
function showPhoto(url){
  const lb = document.createElement("div");
  lb.className = "lightbox";
  const img = document.createElement("img");

  lb.appendChild(img);

  document.body.appendChild(lb);
}

    pct = objs.length ? Math.round(objs.reduce((a,o)=>a+objPct(o),0)/objs.length) : 0;
    stats.append(
      mkStat(objs.length,"Objectives"),
      mkStat(krs.length,"Key results"),
      mkStat(krs.filter(k=>krPct(k)>=70).length,"On track"),
      mkStat(krs.filter(k=>krPct(k)<30).length,"Needs attention"),

      mkStat(DEV.cards.filter(c=>!c.sprint).length,"Backlog"),
      mkStat(inSp.length,"In sprint"),
      mkStat(inSp.filter(c=>c.col==="progress"||c.col==="review").length,"In flight"),

      mkStat(T.filter(t=>t.col!=="done").length,"Open"),
      mkStat(T.filter(t=>t.col==="progress"||t.col==="review").length,"Being fixed"),
      mkStat(doneN,"Resolved"),
      mkStat(T.filter(t=>t.source==="student").length,"From students"),
    );
    updated = BUGS.updated || "\u2014";
  } else if(view==="ideas"){
    const items = TIDEAS.items;
    const contributors = new Set(items.map(i=>i.owner)).size;
    const advanced = items.filter(i=>i.stage==="pipeline"||i.stage==="shipped").length;
    pct = items.length ? Math.round(advanced/items.length*100) : 0;
    stats.append(
      mkStat(items.length,"Ideas"),
      mkStat(items.filter(i=>i.stage==="pipeline").length,"In pipeline"),
      mkStat(items.filter(i=>i.stage==="shipped").length,"Shipped"),
      mkStat(contributors,"Contributors"),
    );
    updated = TIDEAS.updated || "\u2014";
  } else if(view==="content"){

    stats.append(mkStat(c.done,"Done"), mkStat(c.progress,"In progress"), mkStat(c.planned,"Planned"), mkStat(c.blocked,"Blocked"));
    updated = CONTENT.updated || "—";
  } else {
    const leaves = DATA.modules.flatMap(m=>m.items.flatMap(leavesOf));
    const c = counts(leaves);
    pct = pctOf(leaves);
    stats.append(mkStat(c.done,"Done"), mkStat(c.progress,"In progress"), mkStat(c.planned,"Planned"), mkStat(c.blocked,"Blocked"));
    updated = DATA.updated || "—";
  }
  const ov = document.createElement("div");
  ov.className = "overall";
  ov.innerHTML = `<label>${view==="okr"?"Cycle score":"Overall completion"} — <b>${pct}%</b></label>
    <div class="bar"><i style="width:${pct}%; background:${view==="okr"?scoreColor(pct):"var(--done)"}"></i></div>`;
  stats.appendChild(ov);
  const up = document.createElement("span");
  up.className = "updated"; up.textContent = "Updated: "+updated;
  stats.appendChild(up);
  const live = document.createElement("span");
  live.className = "live"+(db?"":" off");
  live.textContent = db ? "● team sync on" : "local only";
  stats.appendChild(live);
}

function nodeEl(node, parentArr, idx, numPath, modKey){
  if(!nodeMatches(node)) return null;
  const isParent = node.items && node.items.length;
  const colKey = modKey+":"+numPath;
  const isCollapsed = collapsed.has(colKey);

  const el = document.createElement("div");
  el.className = "node"+(isParent?" parent":"");
  const row = document.createElement("div");
  row.className = "row";

  const caret = document.createElement("button");
  caret.className = "caret"+(isParent?(isCollapsed?"":" open"):" leaf");
  caret.setAttribute("aria-label","Toggle sub-items");
  caret.innerHTML = '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><path d="m9 6 6 6-6 6"/></svg>';

  const num = document.createElement("span");
  num.className = "num"; num.textContent = numPath;

  const body = document.createElement("div");
  body.className = "body";
  const titleEl = document.createElement("div");
  titleEl.className = "title"; titleEl.textContent = node.title;
  body.appendChild(titleEl);
  if(node.note){
    const noteEl = document.createElement("div");
    noteEl.className = "note"; noteEl.textContent = node.note;
    body.appendChild(noteEl);
  }
  const nps = photoStrip(node.photos);
  if(nps) body.appendChild(nps);

  const meta = document.createElement("div");
  meta.className = "meta";
  if(node.okr){
    const ch = okrChip(node.okr);
    if(ch) meta.appendChild(ch);
  }
  if(node.owner){
    const o = document.createElement("span");
    o.className = "owner"; o.textContent = node.owner;
    meta.appendChild(o);
  }
  if(isParent){
    const lv = leavesOf(node);
    const mini = document.createElement("span");
    mini.className = "mini";
    mini.textContent = `${counts(lv).done}/${lv.length} done · ${pctOf(lv)}%`;
    meta.appendChild(mini);
  } else {
    const pill = document.createElement("button");
    pill.className = "pill "+node.status;
    pill.textContent = STATUS_LABEL[node.status];
    pill.title = "Click to change status";
    pill.onclick = ()=>{
      node.status = STATUS_ORDER[(STATUS_ORDER.indexOf(node.status)+1)%STATUS_ORDER.length];
      saveRoadmap();
    };
    meta.appendChild(pill);
  }

  if(editMode){
    const acts = document.createElement("div");
    acts.className = "acts";
    acts.appendChild(actBtn("board","Send to Development backlog",false, ()=>{
      sendToBacklog(node.title, node.note || "", "roadmap", node.owner);
    }));
    acts.appendChild(actBtn("plus","Add sub-task",false, ()=> addTaskTo(node, "New sub-task under “"+node.title+"”")));
    acts.appendChild(actBtn("pencil","Edit",false, ()=>
      openDialog("Edit task", node, v=>{
        applyFields(node, v);
        if(v.okr) node.okr = v.okr; else delete node.okr;
        if(v.photos && v.photos.length) node.photos = v.photos; else delete node.photos;
        saveRoadmap();
      }, {okrLink:true, photos:true})));
    acts.appendChild(actBtn("trash","Delete",true, ()=>{
      const lv = isParent ? leavesOf(node).length : 0;
      const msg = isParent ? `Delete “${node.title}” and its ${lv} sub-task(s)?` : `Delete “${node.title}”?`;
      if(confirm(msg)){ parentArr.splice(idx,1); saveRoadmap(); toast("Deleted"); }
    }));
    meta.appendChild(acts);
  }

  row.append(caret, num, body, meta);
  el.appendChild(row);

  if(isParent){
    const kids = document.createElement("div");
    kids.className = "children"+(isCollapsed?" hidden":"");
    node.items.forEach((child,i)=>{
      const c = nodeEl(child, node.items, i, numPath+"."+(i+1), modKey);
      if(c) kids.appendChild(c);
    });
    el.appendChild(kids);
    caret.onclick = ()=>{
      kids.classList.toggle("hidden");
      caret.classList.toggle("open");
      if(collapsed.has(colKey)) collapsed.delete(colKey); else collapsed.add(colKey);
    };
  }
  return el;
}

function renderContentRoadmap(){

    head.className = "module-head";

      const ch = okrChip(m.okr);
      if(ch) head.appendChild(ch);
    }
    if(editMode){
      const sp = document.createElement("span"); sp.className="spacer"; head.appendChild(sp);
      const acts = document.createElement("div"); acts.className = "acts";
      acts.appendChild(actBtn("pencil","Rename module",false, ()=>
        openDialog("Rename module", {title:m.name, okr:m.okr}, v=>{
          m.name = v.title;
          if(v.okr) m.okr = v.okr; else delete m.okr;
          saveRoadmap();
        }, {hideExtras:true, okrLink:true})));
      acts.appendChild(actBtn("trash","Delete module",true, ()=>{
        if(confirm(`Delete the whole module “${m.name}” (${lv.length} tasks)?`)){
          DATA.modules.splice(DATA.modules.indexOf(m),1);
          if(activeModule===m.key) activeModule="all";
          saveRoadmap(); toast("Module deleted");
        }
      }));
      head.appendChild(acts);
    }
    block.appendChild(head);
    const vb = visionBanner(m);
    if(vb) block.appendChild(vb);
    const tree = document.createElement("div");
    tree.className = "tree";
    let any = false;
    m.items.forEach((item,i)=>{
      const el = nodeEl(item, m.items, i, String(i+1), m.key);
      if(el){ tree.appendChild(el); any = true; }
    });
    block.appendChild(tree);
    if(editMode){
      const add = document.createElement("button");
      add.className = "addline indent";
      add.textContent = "＋ Add task to "+m.name;
      add.onclick = ()=> addTaskTo(m, "New task in “"+m.name+"”");
      block.appendChild(add);
      wrap.appendChild(block); shown++;
    } else if(any){
      wrap.appendChild(block); shown++;
    }
  });
  if(!shown){
    wrap.innerHTML = '<div class="empty">Nothing matches this filter. Clear the search or choose “All”.</div>';
  }
}

function krEl(kr, ob, ki, oi){
  const row = document.createElement("div");

    body.appendChild(n);
  }

  const bw = document.createElement("div");
  bw.className = "bar-wrap";
  bw.innerHTML = `<div class="bar"><i style="width:${p}%; background:${scoreColor(p)}"></i></div>
    <span class="fig"><b>${fmt(kr.current)}</b> / ${fmt(kr.target)} ${kr.unit||""} · ${p}%</span>`;

    const acts = document.createElement("div");
    acts.className = "acts";

function ideaPts(i){ return STAGE_PTS[i.stage] || 1; }

function renderSidebarIdeas(){
  const wrap = $("mods");
  wrap.innerHTML = "";
  $("side-title").textContent = "Leaderboard";
  const byOwner = {};
  TIDEAS.items.forEach(i=>{
    const o = byOwner[i.owner] = byOwner[i.owner] || {name:i.owner, pts:0, n:0, pipe:0, ship:0};
    o.pts += ideaPts(i); o.n++;
    if(i.stage==="pipeline") o.pipe++;
    if(i.stage==="shipped") o.ship++;
  });
  const rows = Object.values(byOwner).sort((a,b)=>b.pts-a.pts || b.n-a.n);
  const medals = ["\u{1F947}","\u{1F948}","\u{1F949}"];
  rows.forEach((r,i)=>{
    const card = document.createElement("div");
    card.className = "mod lb-card";
    const rank = document.createElement("span");
    rank.className = "lb-rank";
    rank.textContent = medals[i] || (i+1);
    const body = document.createElement("div");
    body.style.minWidth = "0";
    body.innerHTML = '<div class="name"></div><span class="pct"></span>';
    body.querySelector(".name").textContent = r.name;
    body.querySelector(".pct").textContent = r.n+" idea"+(r.n!==1?"s":"")+(r.pipe?" \u00b7 "+r.pipe+" in pipeline":"")+(r.ship?" \u00b7 "+r.ship+" shipped":"");
    const pts = document.createElement("span");
    pts.className = "lb-pts"; pts.textContent = r.pts+" pts";
    card.append(rank, body, pts);
    wrap.appendChild(card);
  });
  if(!rows.length){
    const d = document.createElement("div");
    d.className = "empty"; d.textContent = "No ideas yet \u2014 be the first on the board!";
    wrap.appendChild(d);
  }
  const note = document.createElement("div");
  note.className = "lb-note";
  note.textContent = "Scoring: 1 pt per idea \u00b7 3 pts when it reaches the pipeline \u00b7 5 pts when it ships. Quality beats quantity.";

}

function pickModule(onPick){

  ov.className = "overlay show";
  const dg = document.createElement("div");
  dg.className = "dialog";
  dg.innerHTML = '<h3>Add to which module?</h3>';

    b.className = "addline";
    b.style.marginBottom = "8px";
    b.textContent = m.name;

  });

      idea.stage = STAGE_ORDER[(STAGE_ORDER.indexOf(idea.stage)+1)%STAGE_ORDER.length];
      saveTeamIdeas();
    };
    meta.appendChild(pill);

    if(editMode){
      const acts = document.createElement("div");
      acts.className = "acts";
      if(idea.stage!=="pipeline" && idea.stage!=="shipped"){
        acts.appendChild(actBtn("plus","Add to roadmap pipeline",false, ()=>{
          pickModule(m=>{

    block.appendChild(row);
  });
  wrap.appendChild(block);
}

function kanbanBoard(items, opts){
  // opts: {getCol, setCol, cardExtras(item)->nodes[], onEdit(item), onDelete(item), onAdd(colKey), canAdd}
  const board = document.createElement("div");
  board.className = "kanban";
  KCOLS.forEach((col,ci)=>{
    const kc = document.createElement("div");
    kc.className = "kcol"+(col.key==="done"?" kdone":"");
    const head = document.createElement("div");
    head.className = "kcol-head";
    head.innerHTML = "<b></b><span class='cnt'></span>";
    head.querySelector("b").textContent = col.label + (col.key==="done" ? " \u2713" : "");
    const inCol = items.filter(i=>i.col===col.key);
    head.querySelector(".cnt").textContent = inCol.length;
    kc.appendChild(head);
    inCol.forEach(item=>{
      const card = document.createElement("div");
      card.className = "kcard";
      const t = document.createElement("div");
      t.className = "title"; t.textContent = item.title;
      card.appendChild(t);
      if(item.note){
        const n = document.createElement("div"); n.className = "note"; n.textContent = item.note;
        card.appendChild(n);
      }
      const ps = photoStrip(item.photos);
      if(ps) card.appendChild(ps);
      const meta = document.createElement("div");
      meta.className = "kcard-meta";
      (opts.cardExtras ? opts.cardExtras(item) : []).forEach(x=>x && meta.appendChild(x));
      if(item.owner){
        const o = document.createElement("span"); o.className = "owner"; o.textContent = item.owner;
        meta.appendChild(o);
      }
      if(editMode){
        const acts = document.createElement("div"); acts.className = "acts";
        acts.style.opacity = ".55";
        (opts.extraActs ? opts.extraActs(item) : []).forEach(b=>b && acts.appendChild(b));
        acts.appendChild(actBtn("pencil","Edit",false, ()=>opts.onEdit(item)));
        acts.appendChild(actBtn("trash","Delete",true, ()=>opts.onDelete(item)));
        meta.appendChild(acts);
      }
      const mv = document.createElement("div");
      mv.className = "kmove";
      const back = document.createElement("button");
      back.textContent = "\u25C0"; back.title = "Move left";
      back.disabled = ci===0;
      back.onclick = ()=>{ item.col = KCOLS[ci-1].key; opts.onMove(); };
      const fwd = document.createElement("button");
      fwd.textContent = "\u25B6"; fwd.title = "Move right";
      fwd.disabled = ci===KCOLS.length-1;
      fwd.onclick = ()=>{ item.col = KCOLS[ci+1].key; opts.onMove(); };
      mv.append(back, fwd);
      meta.appendChild(mv);
      card.appendChild(meta);
      kc.appendChild(card);
    });
    if(editMode && opts.onAdd){
      const add = document.createElement("button");
      add.className = "kadd";
      add.textContent = "\uFF0B Add";
      add.onclick = ()=>opts.onAdd(col.key);
      kc.appendChild(add);
    }
    board.appendChild(kc);
  });
  return board;
}

function sendToBacklog(title, note, from, owner, bugId){
  const id = "dv-"+Date.now().toString(36)+Math.random().toString(36).slice(2,5);
  DEV.cards.push({
    id: id,
    title: title,
    note: note || "",
    owner: owner || undefined,

    bugId: bugId || undefined,
    col: "todo",
    sprint: null,
  });
  saveDev();
  toast(bugId ? "Escalated to Development \u2014 the bug will now follow the dev card's status" : "Added to Development backlog");

/* Linked bugs mirror their dev card's column. Dev is the source of truth. */
function syncLinkedBugs(){
  let changed = false;
  DEV.cards.forEach(c=>{
    if(!c.bugId) return;
    const t = BUGS.tickets.find(x=>x.id===c.bugId);
    if(t && t.col !== c.col){ t.col = c.col; changed = true; }
  });
  if(changed){
    BUGS.updated = todayStr();
    if(bugsDb) pushBugs();
  }
  return changed;
}
function bugIsInDev(t){
  return !!(t.devId && DEV.cards.some(c=>c.id===t.devId));
}
function originChip(c){
  if(!c.from) return null;
  const sp = document.createElement("span");
  sp.className = "src "+(c.from==="bug"?"student":"team");
  sp.textContent = c.from==="bug" ? "\uD83D\uDC1E bug" : "\uD83D\uDDFA roadmap";
  return sp;
}
function currentSprint(){
  if(devSprint){
    const sp = DEV.sprints.find(x=>x.id===devSprint);
    if(sp) return sp;
  }
  return DEV.sprints.find(x=>!x.completed) || null;
}

function renderSidebarDev(){
  const wrap = $("mods");
  wrap.innerHTML = "";
  $("side-title").textContent = "Sprints";
  const cur = currentSprint();
  DEV.sprints.forEach(sp=>{
    const n = DEV.cards.filter(c=>c.sprint===sp.id).length;

    const b = mkSideCard(cur && cur.id===sp.id, ()=>{ devSprint = sp.id; renderAll(); });
    b.innerHTML = '<span class="name"></span><span class="pct"></span>';
    b.querySelector(".name").textContent = (sp.completed ? "\u2713 " : "") + sp.name;
    b.querySelector(".pct").textContent = (sp.start||sp.end ? (sp.start||"?")+" \u2192 "+(sp.end||"?")+" \u00b7 " : "") + doneN+"/"+n+" done";
    if(sp.completed) b.style.opacity = ".6";
    if(editMode){
      cardActs(b, [
        actBtn("pencil","Edit sprint name / dates",false, ()=>
          openDialog("Edit sprint", {title:sp.name, start:sp.start, deadline:sp.end}, v=>{
            sp.name = v.title;
            if(v.start) sp.start = v.start; else delete sp.start;
            if(v.deadline) sp.end = v.deadline; else delete sp.end;
            saveDev();
          }, {hideExtras:true, dates:true})),
        actBtn("trash","Delete sprint",true, ()=>{
          const n2 = DEV.cards.filter(c=>c.sprint===sp.id).length;
          if(confirm("Delete "+sp.name+"? Its "+n2+" card(s) move back to the backlog.")){
            DEV.cards.forEach(c=>{ if(c.sprint===sp.id) c.sprint = null; });
            DEV.sprints.splice(DEV.sprints.indexOf(sp),1);
            if(devSprint===sp.id) devSprint = null;
            saveDev(); toast("Sprint deleted");
          }
        }),
      ]);
    }
    wrap.appendChild(b);
  });
  if(editMode){
    const add = document.createElement("button");
    add.className = "mod add";
    add.textContent = "\uFF0B New sprint";
    add.onclick = ()=> openDialog("New sprint", {title:"Sprint "+(DEV.sprints.length+1)}, v=>{
      const sp = { id:"sp-"+Date.now().toString(36), name:v.title };
      if(v.start) sp.start = v.start;
      if(v.deadline) sp.end = v.deadline;
      DEV.sprints.push(sp);
      devSprint = sp.id;
      saveDev(); toast("Sprint created \u2014 pull cards in from the backlog");
    }, {hideExtras:true, dates:true});
    wrap.appendChild(add);
  }
  const backlogN = DEV.cards.filter(c=>!c.sprint).length;
  const note = document.createElement("div");
  note.className = "lb-note";
  note.textContent = backlogN+" item(s) in the backlog below the board. Anyone can move cards; adding, sprints and editing need Edit mode.";
  wrap.appendChild(note);
}

function devCardOpts(sprintId){
  return {
    onMove: saveDev,
    cardExtras: c => [originChip(c)],
    onEdit: c => openDialog("Edit card", c, v=>{
      applyFields(c, v);
      if(v.photos && v.photos.length) c.photos = v.photos; else delete c.photos;
      saveDev();
    }, {photos:true}),
    onDelete: c => { if(confirm("Delete this card?")){ DEV.cards.splice(DEV.cards.indexOf(c),1); saveDev(); toast("Deleted"); } },
    onAdd: colKey => openDialog("New card", {}, v=>{
      const c = { id:"dv-"+Date.now().toString(36), title:v.title, col:colKey, sprint:sprintId };
      if(v.owner) c.owner = v.owner;
      if(v.note) c.note = v.note;
      if(v.photos && v.photos.length) c.photos = v.photos;
      DEV.cards.push(c); saveDev(); toast("Card added");

  };
}

    if(c.owner){ const o = document.createElement("span"); o.className = "owner"; o.textContent = c.owner; meta.appendChild(o); }

      meta.appendChild(mv);
    }
    if(editMode){
      const acts = document.createElement("div"); acts.className = "acts";
      acts.appendChild(actBtn("pencil","Edit",false, ()=> openDialog("Edit backlog item", c, v=>{
        applyFields(c, v);
        if(v.photos && v.photos.length) c.photos = v.photos; else delete c.photos;

  const report = document.createElement("button");
  report.className = "submit-idea";
  report.textContent = "\uD83D\uDC1E \uFF0B Report a bug or issue \u2014 no passcode needed";
  report.onclick = reportBugDialog;
  wrap.appendChild(report);
  wrap.appendChild(kanbanBoard(BUGS.tickets, {
    onMove: saveBugs,
    cardExtras: t => {
      const chips = [bugSrcChip(t), bugAreaChip(t)];
      if(bugIsInDev(t)){
        const b = document.createElement("button");
        b.className = "okr-chip";
        b.textContent = "\uD83D\uDEE0 in dev";
        b.title = "Escalated \u2014 this bug follows its Development card's status. Click to open the board.";
        b.onclick = e => { e.stopPropagation(); view = "dev"; renderAll(); };
        chips.push(b);
      }
      return chips;
    },
    extraActs: t => bugIsInDev(t) ? [] : [actBtn("board","Escalate to Development backlog",false, ()=>{
      const cardId = sendToBacklog("Fix: "+t.title, (t.note?t.note+" \u00b7 ":"")+"Reported by "+t.reporter+(t.area?" \u00b7 "+t.area:""), "bug", undefined, t.id);
      t.devId = cardId;
      saveBugs();
    })],
    onEdit: t => openDialog("Edit ticket", {title:t.title, note:t.note, owner:t.reporter, area:t.area, photos:t.photos}, v=>{
      t.title = v.title;
      t.note = v.note || "";
      t.reporter = v.owner || t.reporter;
      t.area = v.area;
      if(v.photos && v.photos.length) t.photos = v.photos; else delete t.photos;
      saveBugs();
    }, {area:true, ownerLabel:"Reporter", photos:true}),
    onDelete: t => { if(confirm("Delete ticket \u201c"+t.title+"\u201d?")){ BUGS.tickets.splice(BUGS.tickets.indexOf(t),1); saveBugs(); toast("Deleted"); } },
  }));
}

/* ---------- render dispatcher ---------- */
function renderAll(){
  if(!DATA || !OKRS || !CONTENT) return;
  renderHeader();
  $("rm-controls").style.display = view==="roadmap" ? "contents" : "none";
  $("rm-tools").style.display = view==="roadmap" ? "contents" : "none";
  /* Workspace areas — add future sections here (one line each).
     Each needs a renderSidebarX / renderContentX pair wired below. */
  /* Workspace areas, grouped. Add future sections here. */
  const WORKSPACE_GROUPS = [
    {label:"Product", items:[
      {key:"roadmap", label:"Roadmap"},
      {key:"dev", label:"Development"},
      {key:"bugs", label:"Bugs"},
    ]},
  ];
  if(view!=="okr" && view!=="ideas") lastWs = view;
  $("nav-team-ideas").classList.toggle("primary", view==="ideas");
  renderCompanyVision();
  const WORKSPACE_VIEWS = WORKSPACE_GROUPS.flatMap(g=>g.items);
  // top-right: Workspace vs OKRs, active one filled
  $("nav-a").classList.toggle("ghost", view==="okr");
  $("nav-b").classList.toggle("ghost", view!=="okr");
  // sidebar workspace switcher (hidden on OKRs)
  const ws = $("ws-switch");
  ws.innerHTML = "";
  if(view!=="okr"){
    WORKSPACE_GROUPS.forEach(g=>{
      const lbl = document.createElement("div");
      lbl.className = "ws-label"; lbl.textContent = g.label;
      ws.appendChild(lbl);
      g.items.forEach(w=>{
        const b = document.createElement("button");
        b.className = "ws-item"+(view===w.key?" active":"");
        b.innerHTML = '<span class="dot"></span><span></span>';
        b.querySelector("span:last-child").textContent = w.label;
        b.onclick = ()=>{ view = w.key; renderAll(); };
        ws.appendChild(b);
      });
    });
  }
  // Educational Content section: expanded (exam cards) on the content view,
  // collapsed (single summary card) everywhere else. Sits below the active view's sub-tabs.
  const edu = $("edu-switch");
  edu.innerHTML = "";
  if(view!=="okr"){
    if(view==="content"){
      renderSidebarExams(edu);
    } else {
      const lbl = document.createElement("div");
      lbl.className = "ws-label"; lbl.textContent = "Educational Content";
      edu.appendChild(lbl);
      const allTasks = CONTENT.sections.flatMap(s=>s.tasks);
      const b = mkSideCard(false, ()=>{ view = "content"; activeSection = "all"; renderAll(); });
      b.innerHTML = `<span class="name">All exams</span>
        <div class="bar"><i style="width:${pctOf(allTasks)}%"></i></div>
        <span class="pct">${pctOf(allTasks)}% · ${CONTENT.sections.length} sections · ${allTasks.length} tasks</span>`;
      edu.appendChild(b);
    }
  }
  $("side-title").style.display = "";
  if(view==="roadmap"){ renderSidebarRoadmap(); renderContentRoadmap(); }
  else if(view==="content"){
    $("side-title").style.display = "none";
    $("mods").innerHTML = "";
    renderContentContent();
  }
  else if(view==="ideas"){ renderSidebarIdeas(); renderContentIdeas(); }
  else if(view==="dev"){ renderSidebarDev(); renderContentDev(); }
  else if(view==="bugs"){ renderSidebarBugs(); renderContentBugs(); }
  else {
    // OKR structure edits are leadership-only: while on this view, edit affordances
    // render only if the leadership passcode has been entered.
    const _em = editMode;
    editMode = editMode && leaderMode;
    renderSidebarOkr(); renderContentOkr();
    editMode = _em;
    if(editMode && !leaderMode){
      const bar = document.createElement("button");
      bar.className = "vision add-vision";
      bar.style.marginBottom = "16px";
      bar.textContent = "🔒 OKRs are protected — click to unlock with the leadership passcode";
      bar.onclick = ()=>{ if(requireLeader()) renderAll(); };
      $("content").prepend(bar);
    }
  }
}

/* ---------- controls ---------- */
let lastWs = "roadmap";
$("nav-a").onclick = ()=>{ view = lastWs; renderAll(); };
$("nav-b").onclick = ()=>{ view = "okr"; renderAll(); };
$("nav-team-ideas").onclick = ()=>{ view = (view==="ideas") ? lastWs : "ideas"; renderAll(); };
document.querySelectorAll(".chip").forEach(ch=>{
  ch.onclick = ()=>{
    document.querySelectorAll(".chip").forEach(c=>c.classList.remove("active"));
    ch.classList.add("active");
    activeStatus = ch.dataset.status;
    renderContentRoadmap();
  };
});
$("search").addEventListener("input", e=>{
  query = e.target.value.trim().toLowerCase();
  renderContentRoadmap();
});
$("expand-all").onclick = ()=>{ collapsed.clear(); renderContentRoadmap(); };
$("collapse-all").onclick = ()=>{
  DATA.modules.forEach(m=>{
    const mark = (n, path)=>{ if(n.items && n.items.length){ collapsed.add(m.key+":"+path); n.items.forEach((c,i)=>mark(c, path+"."+(i+1))); } };
    m.items.forEach((n,i)=>mark(n, String(i+1)));
  });
  renderContentRoadmap();
};
$("refresh-btn").onclick = ()=> refresh(true);

/* ---------- backup (export / import) ---------- */
$("backup-btn").onclick = ()=>{
  const payload = {
    app: "team-roadmap-backup",
    version: 1,
    exportedAt: new Date().toISOString(),
    roadmap: clean(DATA),
    okrs: clean(OKRS),
    content: clean(CONTENT),
    teamIdeas: clean(TIDEAS),
    dev: clean(DEV),
    bugs: clean(BUGS),
  };
  const blob = new Blob([JSON.stringify(payload, null, 2)], {type:"application/json"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  const d = new Date(), pad = n=>String(n).padStart(2,"0");
  a.download = "roadmap-backup-"+d.getFullYear()+"-"+pad(d.getMonth()+1)+"-"+pad(d.getDate())+"_"+pad(d.getHours())+pad(d.getMinutes())+".json";
  document.body.appendChild(a);
  a.click();
  setTimeout(()=>{ URL.revokeObjectURL(a.href); a.remove(); }, 500);
  toast("Backup downloaded — keep it somewhere safe");
};

$("import-btn").onclick = ()=>{
  if(!editMode){ toast("Turn on Edit first — importing replaces all data"); return; }
  $("import-file").click();
};
$("import-file").addEventListener("change", async e=>{
  const f = e.target.files[0];
  e.target.value = "";
  if(!f) return;
  let rec;
  try{ rec = JSON.parse(await f.text()); }
  catch(err){ toast("That file isn't valid JSON"); return; }
  if(!rec || typeof rec!=="object" || !rec.roadmap || !Array.isArray(rec.roadmap.modules)){
    toast("This doesn't look like a backup from this tool"); return;
  }
  const parts = [(rec.roadmap.modules||[]).length+" module(s)"];
  if(rec.okrs) parts.push((rec.okrs.cycles||[]).length+" OKR cycle(s)");
  if(rec.content) parts.push((rec.content.sections||[]).length+" content section(s)");
  if(rec.teamIdeas) parts.push((rec.teamIdeas.items||[]).length+" idea(s)");
  if(rec.dev) parts.push((rec.dev.cards||[]).length+" dev card(s)");
  if(rec.bugs) parts.push((rec.bugs.tickets||[]).length+" bug ticket(s)");
  const when = rec.exportedAt ? "\nBackup taken: "+new Date(rec.exportedAt).toLocaleString() : "";
  if(!confirm("Restore this backup? It will REPLACE the current data for the whole team.\n\nContains: "+parts.join(", ")+when+"\n\nTip: click Backup first if you want a copy of what's there now.")) return;
  DATA = normalize(rec.roadmap);
  OKRS = normalizeOkrs(rec.okrs || clean(DEFAULT_OKRS));
  CONTENT = normalizeContent(rec.content || clean(DEFAULT_CONTENT));
  TIDEAS = normalizeTeamIdeas(rec.teamIdeas || clean(DEFAULT_TEAM_IDEAS));
  DEV = normalizeDev(rec.dev || clean(DEFAULT_DEV));
  DATA.updated = todayStr();
  activeModule = "all"; activeSection = "all"; activeCycle = null; devSprint = null; collapsed.clear();
  renderAll();
  await pushAll();
  if(rec.bugs && Array.isArray(rec.bugs.tickets)){
    BUGS = normalizeBugs(clean(rec.bugs));
    BUGS.updated = todayStr();
    renderAll();
    if(bugsDb) await pushBugs();
  }
  toast("Backup restored"+(db ? " and synced to the team" : " (local only — JSONBin not connected)"));
});

$("edit-toggle").onclick = ()=>{
  if(!editMode && EDIT_PASSCODE && sessionStorage.getItem("rm-ok")!=="1"){
    const p = prompt("Enter the edit passcode:");
    if(p!==EDIT_PASSCODE){ toast("Wrong passcode"); return; }
    sessionStorage.setItem("rm-ok","1");
  }
  editMode = !editMode;
  const b = $("edit-toggle");
  b.textContent = editMode ? "✓ Editing — click to finish" : "✎ Edit";
  b.classList.toggle("editing", editMode);
  b.classList.toggle("primary", !editMode);
  renderAll();
};
function toast(msg){
  const t = $("toast");
  t.textContent = msg;
  t.classList.add("show");
  clearTimeout(t._h);
  t._h = setTimeout(()=>t.classList.remove("show"), 3000);
}

start();
</script>

<!-- ============ DU BUDDY: STUDENT IDEAS -> PIPELINE ============ -->
<script>
(function(){
  var IDEA_BIN_ID="6a477b27da38895dfe2784a1";
  var IDEA_KEY="$2a$10$1mgC2VmJE7F0xP/H3DFt.eveNBdxStDmz1Sk1T3CvlLZbokiJGa0.";  // scoped access key (Read+Update) — never put the Master Key in a web page
  var MARK_PLANNED=true; // adding an idea also marks it "Planned" on the public ideas board

  var css=document.createElement("style");
  css.textContent=
    "#duIdeasPanel{position:fixed;inset:0;z-index:9999;background:rgba(15,23,42,.45);display:none;align-items:stretch;justify-content:flex-end;font-family:inherit}"+
    "#duIdeasPanel.show{display:flex}"+
    "#duIdeasPanel .dui-side{width:min(540px,100%);background:var(--card,#fff);display:flex;flex-direction:column;box-shadow:-12px 0 40px rgba(0,0,0,.2)}"+
    "#duIdeasPanel .dui-top{display:flex;align-items:center;gap:10px;padding:16px 18px;border-bottom:1px solid var(--line,#e5e7eb)}"+
    "#duIdeasPanel .dui-top h3{margin:0;font-size:15px}"+
    "#duIdeasPanel .dui-x{margin-left:auto;border:1px solid var(--line,#e5e7eb);background:transparent;color:inherit;border-radius:8px;padding:7px 12px;font-weight:600;cursor:pointer}"+
    "#duIdeasPanel .dui-bar{display:flex;gap:6px;flex-wrap:wrap;padding:10px 16px;border-bottom:1px solid var(--line,#e5e7eb)}"+
    "#duIdeasPanel .dui-chip{border:1px solid var(--line,#e5e7eb);background:transparent;color:inherit;border-radius:16px;padding:5px 11px;font-size:12px;font-weight:600;cursor:pointer}"+
    "#duIdeasPanel .dui-chip.on{background:#4263eb;color:#fff;border-color:#4263eb}"+
    "#duIdeasPanel .dui-list{flex:1;overflow:auto;padding:14px 16px 22px}"+
    "#duIdeasPanel .dui-card{border:1px solid var(--line,#e5e7eb);border-radius:12px;padding:12px 14px;margin-bottom:10px}"+
    "#duIdeasPanel .dui-h{display:flex;gap:8px;align-items:center;flex-wrap:wrap}"+
    "#duIdeasPanel .dui-v{font-weight:800;color:#4263eb;font-size:13px}"+
    "#duIdeasPanel .dui-p{font-size:10.5px;font-weight:700;background:rgba(66,99,235,.1);color:#4263eb;border-radius:12px;padding:2px 8px}"+
    "#duIdeasPanel .dui-s{font-size:10.5px;font-weight:700;border-radius:12px;padding:2px 8px;background:var(--planned-bg,#eef);color:var(--planned,#448)}"+
    "#duIdeasPanel .dui-t{font-size:13.5px;font-weight:700;margin-top:6px}"+
    "#duIdeasPanel .dui-d{font-size:12.5px;opacity:.75;margin-top:4px;line-height:1.5;white-space:pre-wrap}"+
    "#duIdeasPanel .dui-add{margin-top:9px;border:1px solid #4263eb;background:rgba(66,99,235,.08);color:#4263eb;border-radius:8px;padding:7px 12px;font-size:12px;font-weight:700;cursor:pointer}"+
    "#duIdeasPanel .dui-add:disabled{opacity:.5;cursor:default}"+
    "#duIdeasPanel .dui-empty{padding:40px 16px;text-align:center;opacity:.6;font-size:13.5px}"+
    "#duiPick{position:fixed;inset:0;z-index:10000;display:none;align-items:center;justify-content:center;background:rgba(15,23,42,.5)}"+
    "#duiPick.show{display:flex}"+
    "#duiPick .dui-pk{background:var(--card,#fff);border-radius:14px;padding:18px;max-width:380px;width:92%;box-shadow:0 20px 60px rgba(0,0,0,.3)}"+
    "#duiPick h4{margin:0 0 10px;font-size:14px}"+
    "#duiPick button.mod{display:block;width:100%;text-align:left;border:1px solid var(--line,#e5e7eb);background:transparent;color:inherit;border-radius:9px;padding:10px 12px;font-size:13px;font-weight:600;cursor:pointer;margin-top:7px}"+
    "#duiPick button.mod:hover{border-color:#4263eb;color:#4263eb}";
  document.head.appendChild(css);

  var panel=document.createElement("div");
  panel.id="duIdeasPanel";
  panel.innerHTML='<div class="dui-side">'+
    '<div class="dui-top"><h3>💡 Student Ideas — live board</h3><button class="dui-x">Close</button></div>'+
    '<div class="dui-bar" id="duiBar"></div>'+
    '<div class="dui-list" id="duiList"><div class="dui-empty">Loading ideas…</div></div></div>';
  document.body.appendChild(panel);
  var pick=document.createElement("div");
  pick.id="duiPick";
  pick.innerHTML='<div class="dui-pk"><h4>Add to which module?</h4><div id="duiPickList"></div></div>';
  document.body.appendChild(pick);

  var IDEAS=[], PROD="all", PENDING=null;
  var escp=function(x){return String(x==null?"":x).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");};
  var STATUS={new:"In review",planned:"Planned",progress:"In progress",done:"Completed",later:"Not now"};

  function loadIdeas(){
    document.getElementById("duiList").innerHTML='<div class="dui-empty">Loading ideas…</div>';
    fetch("https://api.jsonbin.io/v3/b/"+IDEA_BIN_ID+"/latest",{headers:{"X-Access-Key":IDEA_KEY}})
      .then(function(r){ if(!r.ok) throw 0; return r.json(); })
      .then(function(j){ var rec=j.record||{};
        IDEAS=(Array.isArray(rec.ideas)?rec.ideas:[]).map(function(x){ x=x||{}; x.votes=x.votes||0; x.status=x.status||"new"; x.product=x.product||"Preference Builder"; return x; });
        renderIdeas(); })
      .catch(function(){ document.getElementById("duiList").innerHTML='<div class="dui-empty">Couldn\'t load the ideas board.</div>'; });
  }
  function renderIdeas(){
    var set={}; IDEAS.forEach(function(i){ set[i.product]=1; });
    var prods=["all"].concat(Object.keys(set));
    document.getElementById("duiBar").innerHTML=prods.map(function(p){ return '<button class="dui-chip'+(PROD===p?' on':'')+'" data-prod="'+escp(p)+'">'+(p==="all"?"All products":escp(p))+'</button>'; }).join("");
    var list=IDEAS.filter(function(i){ return PROD==="all"||i.product===PROD; })
      .sort(function(a,b){ return (b.votes-a.votes)||String(b.at||"").localeCompare(String(a.at||"")); });
    var box=document.getElementById("duiList");
    if(!list.length){ box.innerHTML='<div class="dui-empty">No ideas here yet.</div>'; return; }
    box.innerHTML=list.map(function(i){
      var added=(i.status==="planned"||i.status==="progress"||i.status==="done");
      return '<div class="dui-card"><div class="dui-h"><span class="dui-v">▲ '+i.votes+'</span><span class="dui-p">'+escp(i.product)+'</span><span class="dui-s">'+escp(STATUS[i.status]||i.status)+'</span></div>'+
        (i.title?'<div class="dui-t">'+escp(i.title)+'</div>':'')+
        (i.text?'<div class="dui-d">'+escp(i.text)+'</div>':'')+
        '<button class="dui-add" data-add="'+escp(i.id||"")+'"'+(added?" disabled":"")+'>'+(added?"✓ In pipeline":"➕ Add to pipeline")+'</button></div>';
    }).join("");
  }
  function openPicker(idea){
    if(!editMode){ toast("Turn on Edit (top right) to add ideas to the pipeline"); return; }
    if(!DATA.modules.length){ toast("Create a module first"); return; }
    PENDING=idea;
    document.getElementById("duiPickList").innerHTML=DATA.modules.map(function(m,ix){ return '<button class="mod" data-mod="'+ix+'">'+escp(m.name)+'</button>'; }).join("");
    pick.classList.add("show");
  }
  function addToModule(ix){
    var m=DATA.modules[ix], i=PENDING; if(!m||!i) return;
    var title=(i.title||"").trim()||((i.text||"").slice(0,70)+(((i.text||"").length>70)?"…":""));
    var n={title:title, status:"planned", note:"💡 Student idea · "+i.product+" · "+i.votes+"▲"+((i.title&&i.text)?(" — "+i.text):"")};
    m.items=m.items||[]; m.items.push(n);
    saveRoadmap();
    toast("Added to “"+m.name+"” pipeline");
    pick.classList.remove("show"); PENDING=null;
    if(MARK_PLANNED && i.status==="new"){
      fetch("https://api.jsonbin.io/v3/b/"+IDEA_BIN_ID+"/latest",{headers:{"X-Access-Key":IDEA_KEY}})
        .then(function(r){ return r.json(); })
        .then(function(j){ var rec=j.record||{}; rec.ideas=Array.isArray(rec.ideas)?rec.ideas:[];
          var t=rec.ideas.find(function(x){ return x&&x.id===i.id; });
          if(t){ t.status="planned";
            return fetch("https://api.jsonbin.io/v3/b/"+IDEA_BIN_ID,{method:"PUT",headers:{"Content-Type":"application/json","X-Access-Key":IDEA_KEY},body:JSON.stringify(rec)});
          } })
        .then(function(){ i.status="planned"; renderIdeas(); }).catch(function(){});
    } else { i.status=(i.status==="new")?"planned":i.status; renderIdeas(); }
  }

  document.getElementById("nav-ideas").onclick=function(){ panel.classList.add("show"); loadIdeas(); };
  panel.addEventListener("click",function(e){
    if(e.target.classList.contains("dui-x")||e.target===panel){ panel.classList.remove("show"); return; }
    var p=e.target.closest("[data-prod]"); if(p){ PROD=p.getAttribute("data-prod"); renderIdeas(); return; }
    var a=e.target.closest("[data-add]"); if(a){ var id=a.getAttribute("data-add"); var idea=IDEAS.find(function(x){return x.id===id;}); if(idea) openPicker(idea); return; }
  });
  pick.addEventListener("click",function(e){
    if(e.target===pick){ pick.classList.remove("show"); PENDING=null; return; }
    var m=e.target.closest("[data-mod]"); if(m){ addToModule(+m.getAttribute("data-mod")); }
  });
})();
</script>
